name: Security Scan

# Weekly vulnerability scanning (SOC 2 CC7.1; PCI Req 6/11). CodeQL static
# analysis + a dependency audit gate. Dependabot (config in .github/dependabot.yml)
# opens update PRs continuously; this workflow is the scheduled deep scan.
# Remediation SLA: compliance/policies/vulnerability-management.md.

on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
      - name: Autobuild
        uses: github/codeql-action/autobuild@v4
      - name: Analyze
        uses: github/codeql-action/analyze@v4

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Baseline gate (weekly schedule + pushes to master), NOT a per-PR gate: the
    # remediation SLA (vulnerability-management.md) gives 7/30/90 days, so a PR
    # should not be blocked by a pre-existing advisory it didn't introduce.
    # CodeQL still runs on PRs for new-code findings.
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Audit dependencies (strict — fails on critical/high)
        run: pnpm exec tsx scripts/compliance/dependency-scan.ts --strict
