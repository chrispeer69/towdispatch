# Dependabot — weekly dependency updates (SOC 2 CC7.1; PCI Req 6).
# Update PRs flow through branch protection + review (change management, CC8.1).
# Remediation SLA: compliance/policies/vulnerability-management.md.
version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - security
    groups:
      # Batch low-risk dev/tooling bumps to cut PR noise; runtime deps stay
      # individual so each is reviewed on its own merits.
      dev-dependencies:
        dependency-type: development

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Etc/UTC
    labels:
      - dependencies
      - ci
