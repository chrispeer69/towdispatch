# Railway service config for the US Tow DISPATCH web app (Next.js).
#
# Dashboard settings for this service:
#   Root Directory  = / (repo root)
#   Config Path     = apps/web/railway.toml
#   Watch Paths     = apps/web/**, packages/shared/**, packages/ui/**, pnpm-lock.yaml

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/web/Dockerfile"

[deploy]
startCommand = "pnpm --filter @ustowdispatch/web run start:prod"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
