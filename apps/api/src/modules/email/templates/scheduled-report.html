<!doctype html>
<html>
  <body style="font-family: Arial, sans-serif; color: #1A1E2A; max-width: 640px; margin: 0 auto; padding: 24px;">
    <div style="background-color: {{orange}}; color: white; padding: 16px; border-radius: 6px 6px 0 0;">
      <h1 style="margin: 0; font-size: 20px;">{{productName}}</h1>
    </div>
    <div style="background-color: #fff; border: 1px solid #E2E8F0; border-top: 0; padding: 24px; border-radius: 0 0 6px 6px;">
      <p>Your scheduled report <strong>{{reportName}}</strong> ({{reportTitle}}) is ready.</p>
      <p><a href="{{downloadUrl}}" style="background-color: {{orange}}; color: white; padding: 12px 20px; text-decoration: none; border-radius: 4px; display: inline-block;">Download {{format}}</a></p>
      <p style="color: #475569; font-size: 12px;">The link expires in 24 hours. Re-run the schedule to refresh.</p>
    </div>
  </body>
</html>
