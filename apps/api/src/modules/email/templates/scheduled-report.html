<!doctype html>
<html>
  <body style="font-family: Arial, sans-serif; color: #1A1E2A; max-width: 640px; margin: 0 auto; padding: 24px;">
    <div style="background-color: {{orange}}; color: white; padding: 16px; border-radius: 6px 6px 0 0;">
      <h1 style="margin: 0; font-size: 20px;">Scheduled report</h1>
    </div>
    <div style="background-color: #fff; border: 1px solid #E2E8F0; border-top: 0; padding: 24px; border-radius: 0 0 6px 6px;">
      <p>Your scheduled report <strong>{{reportName}}</strong> is ready.</p>
      <p>
        <a href="{{downloadUrl}}" style="background-color: {{orange}}; color: white; padding: 10px 16px; text-decoration: none; border-radius: 4px; display: inline-block;">Download report</a>
      </p>
      <table style="width: 100%; border-collapse: collapse; margin: 16px 0;">
        <tr><td style="padding: 6px 0; color: #475569;">File</td><td style="padding: 6px 0; text-align: right;">{{fileName}}</td></tr>
        <tr><td style="padding: 6px 0; color: #475569;">Size</td><td style="padding: 6px 0; text-align: right;">{{sizeBytes}} bytes</td></tr>
        <tr><td style="padding: 6px 0; color: #475569;">Link expires</td><td style="padding: 6px 0; text-align: right;">{{expiresAt}}</td></tr>
      </table>
      <p style="color: #475569; font-size: 14px;">If you didn't ask for this, reply to this email and we'll cancel the schedule.</p>
    </div>
  </body>
</html>
