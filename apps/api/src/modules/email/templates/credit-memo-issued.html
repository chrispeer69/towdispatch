<!doctype html>
<html>
  <body style="font-family: Arial, sans-serif; color: #1A1E2A; max-width: 640px; margin: 0 auto; padding: 24px;">
    <div style="background-color: {{orange}}; color: white; padding: 16px; border-radius: 6px 6px 0 0;">
      <h1 style="margin: 0; font-size: 20px;">Credit memo issued</h1>
    </div>
    <div style="background-color: #fff; border: 1px solid #E2E8F0; border-top: 0; padding: 24px; border-radius: 0 0 6px 6px;">
      <p>Hi {{recipientName}},</p>
      <p><strong>{{tenantName}}</strong> has issued credit memo <strong>{{memoNumber}}</strong> against invoice <strong>{{invoiceNumber}}</strong>.</p>
      <table style="width: 100%; border-collapse: collapse; margin: 16px 0;">
        <tr><td style="padding: 6px 0; color: #475569;">Credit amount</td><td style="padding: 6px 0; text-align: right; font-weight: bold;">{{amountFormatted}}</td></tr>
        <tr><td style="padding: 6px 0; color: #475569;">Reason</td><td style="padding: 6px 0; text-align: right;">{{reason}}</td></tr>
      </table>
      <p style="color: #475569; font-size: 14px;">{{appliedToText}}</p>
    </div>
  </body>
</html>
