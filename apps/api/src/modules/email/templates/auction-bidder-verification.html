<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Confirm your {{productName}} bidder email</title>
  </head>
  <body style="margin:0;padding:0;background:{{steel}};font-family:'Helvetica Neue',Arial,sans-serif;color:#F0EDE8;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:{{steel}};padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="560" cellspacing="0" cellpadding="0" border="0" style="background:#252A38;border:1px solid #3A4158;border-radius:14px;overflow:hidden;">
            <tr>
              <td style="padding:24px 28px;border-bottom:1px solid #3A4158;font-size:16px;font-weight:800;letter-spacing:0.04em;color:#F0EDE8;">
                {{productName}} <span style="color:{{orange}};">Marketplace</span>
              </td>
            </tr>
            <tr>
              <td style="padding:32px 28px;font-size:15px;line-height:1.6;color:#F0EDE8;">
                <p style="margin:0 0 16px;font-size:20px;font-weight:700;">Welcome, {{recipientName}}.</p>
                <p style="margin:0 0 16px;">Confirm your email to start bidding in the auction marketplace.</p>
                <p style="margin:24px 0;text-align:center;">
                  <a href="{{verifyUrl}}" style="display:inline-block;background:{{orange}};color:#FFFFFF;text-decoration:none;font-weight:700;padding:14px 28px;border-radius:10px;">Confirm email</a>
                </p>
                <p style="margin:0 0 16px;word-break:break-all;font-family:'Menlo',monospace;font-size:12px;color:#9CA3B5;">{{verifyUrl}}</p>
                <p style="margin:24px 0 0;color:#626882;font-size:12px;">This link expires in 24 hours. If you didn't register, ignore this email.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
