# Railway service config for the US Tow DISPATCH API.
#
# In the Railway dashboard for this service:
#   Root Directory  = / (repo root, so the workspace builds correctly)
#   Config Path     = apps/api/railway.toml
#   Watch Paths     = apps/api/**, packages/db/**, packages/shared/**, pnpm-lock.yaml
#
# preDeployCommand runs the migration once per deploy, before the new
# container starts taking traffic. If migrations fail the deploy is halted
# and the previous version keeps serving.

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/api/Dockerfile"

[deploy]
startCommand = "pnpm --filter @ustowdispatch/api run start:prod"
preDeployCommand = "pnpm --filter @ustowdispatch/db run migrate"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
